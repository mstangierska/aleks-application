        // Extract and show hospital locations for a rotation
        function showHospitalLocations(rotation) {
            console.log('🏥 ========== SHOWING HOSPITAL LOCATIONS ==========');
            console.log('📋 Rotation:', rotation.preference);
            console.log('📍 Rotation Location:', rotation.location_name, `(${rotation.lat}, ${rotation.lon})`);
            console.log('🗺️ Region:', rotation.region, '/', rotation.area);
            
            // Hide general hospital markers (only show rotation-specific ones)
            if (map.hasLayer(markersLayer)) {
                map.removeLayer(markersLayer);
                console.log('👻 Hidden general hospital markers');
            }
            
            // Clear previous hospital markers, connections, and circle
            hospitalMarkersLayer.clearLayers();
            hospitalMarkersByName = {}; // Clear hospital marker references
            map.removeLayer(hospitalMarkersLayer);
            
            if (hospitalConnections) {
                map.removeLayer(hospitalConnections);
                hospitalConnections = null;
            }
            
            if (rotationCircle) {
                map.removeLayer(rotationCircle);
                rotationCircle = null;
            }
            console.log('🧹 Cleared previous hospital markers, connections, and circle');
            
            // Extract hospital names from description
            const hospitalNames = extractHospitalNames(rotation.description, rotation.area);
            
            console.log(`🔍 Found ${hospitalNames.length} hospitals in rotation:`, hospitalNames);
            
            const foundHospitals = [];
            const foundHospitalIds = new Set(); // Track to avoid duplicates
            
            if (hospitalNames.length === 0) {
                console.log('⚠️ No hospitals extracted from description, trying location match...');
                // If no specific hospitals found, try to match with location
                const locationHospitals = hospitalsData.filter(h => 
                    h.name === rotation.location_name || 
                    h.hospital_name.toLowerCase() === rotation.location_name.toLowerCase()
                );
                
                console.log(`📍 Found ${locationHospitals.length} hospitals matching exact location:`, 
                    locationHospitals.map(h => h.hospital_name));
                
                locationHospitals.forEach((hospital, index) => {
                    if (!foundHospitalIds.has(hospital.hospital_name)) {
                        console.log(`  ${index === 0 ? '⭐' : '•'} Adding hospital: ${hospital.hospital_name} (${hospital.lat}, ${hospital.lon})`);
                        addHospitalMarker(hospital, rotation, index === 0); // First one is main
                        foundHospitals.push(hospital);
                        foundHospitalIds.add(hospital.hospital_name);
                    }
                });
            } else {
                console.log('🔎 Matching extracted names with hospital database...');
                // Match extracted names with hospital data
                // ONLY show hospitals that match the extracted names
                hospitalNames.forEach((hospName, index) => {
                    console.log(`  Searching for: "${hospName}"`);
                    
                    // More strict matching with prioritization
                    const hospLower = hospName.toLowerCase().replace(/\s+/g, ' ').trim();
                    
                    // First try exact matches
                    let matchedHospitals = hospitalsData.filter(h => {
                        const hNameLower = h.hospital_name.toLowerCase().replace(/\s+/g, ' ').trim();
                        return hNameLower === hospLower;
                    });
                    
                    // If no exact match, try substring matches
                    if (matchedHospitals.length === 0) {
                        matchedHospitals = hospitalsData.filter(h => {
                            const hNameLower = h.hospital_name.toLowerCase().replace(/\s+/g, ' ').trim();
                            return hNameLower.includes(hospLower) || hospLower.includes(hNameLower);
                        });
                    }
                    
                    // If still no match, try word-based matching
                    if (matchedHospitals.length === 0) {
                        const commonWords = ['hospital', 'trust', 'foundation', 'royal', 'general', 'university', 'college', 'nhs', 'the', 'and'];
                        const extractedWords = hospLower.split(' ').filter(w => 
                            w.length > 3 && !commonWords.includes(w)
                        );
                        
                        if (extractedWords.length > 0) {
                            matchedHospitals = hospitalsData.filter(h => {
                                const hNameLower = h.hospital_name.toLowerCase().replace(/\s+/g, ' ').trim();
                                const hospitalWords = hNameLower.split(' ').filter(w => 
                                    w.length > 3 && !commonWords.includes(w)
                                );
                                
                                if (hospitalWords.length === 0) return false;
                                
                                // Calculate how many extracted words match hospital words
                                const matchCount = extractedWords.filter(word => 
                                    hospitalWords.some(hw => hw === word || hw.includes(word) || word.includes(hw))
                                ).length;
                                
                                // Require at least 60% of extracted words to match
                                const matchRatio = matchCount / extractedWords.length;
                                return matchRatio >= 0.6;
                            });
                            
                            // Sort by best match ratio (highest first)
                            matchedHospitals.sort((a, b) => {
                                const aWords = a.hospital_name.toLowerCase().split(' ').filter(w => 
                                    w.length > 3 && !commonWords.includes(w)
                                );
                                const bWords = b.hospital_name.toLowerCase().split(' ').filter(w => 
                                    w.length > 3 && !commonWords.includes(w)
                                );
                                
                                const aRatio = extractedWords.filter(word => 
                                    aWords.some(hw => hw === word || hw.includes(word) || word.includes(hw))
                                ).length / extractedWords.length;
                                
                                const bRatio = extractedWords.filter(word => 
                                    bWords.some(hw => hw === word || hw.includes(word) || word.includes(hw))
                                ).length / extractedWords.length;
                                
                                return bRatio - aRatio; // Higher ratio first
                            });
                        }
                    }
                    
                    if (matchedHospitals.length > 0) {
                        console.log(`    ✅ Matched ${matchedHospitals.length} hospital(s):`, 
                            matchedHospitals.map(h => h.hospital_name));
                        // Only add the first match for this extracted name
                        const h = matchedHospitals[0];
                        if (!foundHospitalIds.has(h.hospital_name)) {
                            console.log(`      ${index === 0 ? '⭐' : '•'} Adding: ${h.hospital_name} at (${h.lat}, ${h.lon})`);
                            addHospitalMarker(h, rotation, index === 0); // First one is main
                            foundHospitals.push(h);
                            foundHospitalIds.add(h.hospital_name);
                        } else {
                            console.log(`      ⏭️ Skipping duplicate: ${h.hospital_name}`);
                        }
                    } else {
                        console.log(`    ❌ No match found for "${hospName}" in database`);
                        console.log(`    💡 This hospital may not be in our database yet`);
                    }
                });
            }
            
            console.log(`\n📊 Total unique hospitals added to map: ${foundHospitals.length}`);
            
            // If no hospitals found from extraction, try location-based matching
            if (foundHospitals.length === 0) {
                console.log('⚠️ No hospitals found from description extraction');
                console.log('🔍 Attempting location-based matching...');
                console.log(`📍 Rotation location: "${rotation.location_name}" in ${rotation.area}`);
                
                // Try to match hospitals by location name, area, or trust name
                const locationMatches = hospitalsData.filter(h => {
                    const locationLower = rotation.location_name?.toLowerCase() || '';
                    const areaLower = rotation.area?.toLowerCase() || '';
                    const hNameLower = h.name?.toLowerCase() || '';
                    const hSubRegionLower = h.sub_region?.toLowerCase() || '';
                    const hHospitalNameLower = h.hospital_name?.toLowerCase() || '';
                    const hRegionLower = h.region?.toLowerCase() || '';
                    
                    // Check if location name matches hospital location or hospital name contains location
                    const matchesLocation = (locationLower.length > 3 && (
                        hNameLower.includes(locationLower) || 
                        locationLower.includes(hNameLower) ||
                        hHospitalNameLower.includes(locationLower)
                    ));
                    
                    // Check if area/trust name matches
                    const matchesArea = (areaLower.length > 3 && (
                        hNameLower.includes(areaLower) || 
                        areaLower.includes(hNameLower)
                    ));
                    
                    // Check if sub_region matches
                    const matchesSubRegion = (hSubRegionLower.length > 3 && 
                        rotation.sub_region?.toLowerCase().includes(hSubRegionLower));
                    
                    return matchesLocation || matchesArea || matchesSubRegion;
                });
                
                if (locationMatches.length > 0) {
                    console.log(`✅ Found ${locationMatches.length} hospital(s) by location:`, 
                        locationMatches.map(h => h.hospital_name));
                    
                    // Add up to 3 location matches (to avoid overwhelming the map)
                    locationMatches.slice(0, 3).forEach((h, index) => {
                        if (!foundHospitalIds.has(h.hospital_name)) {
                            console.log(`  ${index === 0 ? '⭐' : '•'} Adding: ${h.hospital_name} at (${h.lat}, ${h.lon})`);
                            addHospitalMarker(h, rotation, index === 0); // First one is main
                            foundHospitals.push(h);
                            foundHospitalIds.add(h.hospital_name);
                        }
                    });
                } else {
                    console.log('❌ No hospitals found by location match');
                    console.log('💡 Extracted names:', hospitalNames);
                    console.log('💡 These hospitals may need to be added to the database');
                }
            }
            
            if (foundHospitals.length === 0) {
                console.log('⚠️ WARNING: No hospitals found for this rotation at all');
            }
            
            // If we found hospital markers, add the layer and zoom to them
            if (hospitalMarkersLayer.getLayers().length > 0) {
                map.addLayer(hospitalMarkersLayer);
                console.log('✅ Hospital markers layer added to map');
                
                // Calculate proper rotation area circle
                if (foundHospitals.length >= 2) {
                    // Find bounding box of all hospitals
                    const lats = foundHospitals.map(h => h.lat);
                    const lons = foundHospitals.map(h => h.lon);
                    const minLat = Math.min(...lats);
                    const maxLat = Math.max(...lats);
                    const minLon = Math.min(...lons);
                    const maxLon = Math.max(...lons);
                    
                    // Center is the center of the bounding box
                    const centerLat = (minLat + maxLat) / 2;
                    const centerLon = (minLon + maxLon) / 2;
                    
                    console.log(`📐 Bounding box calculated:`);
                    console.log(`   Lat: ${minLat.toFixed(4)} to ${maxLat.toFixed(4)}`);
                    console.log(`   Lon: ${minLon.toFixed(4)} to ${maxLon.toFixed(4)}`);
                    console.log(`   Center: (${centerLat.toFixed(4)}, ${centerLon.toFixed(4)})`);
                    
                    // Calculate radius as distance from center to furthest corner
                    const distances = foundHospitals.map(h => {
                        // Haversine-like approximation for distance in meters
                        const R = 6371000; // Earth's radius in meters
                        const dLat = (h.lat - centerLat) * Math.PI / 180;
                        const dLon = (h.lon - centerLon) * Math.PI / 180;
                        const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                                Math.cos(centerLat * Math.PI / 180) * Math.cos(h.lat * Math.PI / 180) *
                                Math.sin(dLon/2) * Math.sin(dLon/2);
                        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
                        return R * c;
                    });
                    const maxDistance = Math.max(...distances);
                    
                    console.log(`📏 Maximum distance from center: ${(maxDistance / 1000).toFixed(2)} km`);
                    
                    // Add circle showing the rotation area
                    // For single hospital: add 2.5km radius to show area
                    // For multiple hospitals: tight fit around them
                    let circleRadius;
                    if (foundHospitals.length === 1) {
                        // Single hospital: show 2.5km radius circle
                        circleRadius = 2500; // 2.5km radius
                        console.log(`⚪ Single hospital - showing 2.5km radius circle`);
                    } else if (maxDistance > 1000 && maxDistance < 50000) {
                        // Multiple hospitals between 1-50km apart: tight fit
                        circleRadius = maxDistance + 1000; // Add just 1km buffer
                        console.log(`⚪ Multiple hospitals - tight fit with 1km buffer`);
                    }
                    
                    if (circleRadius) {
                        rotationCircle = L.circle([centerLat, centerLon], {
                            radius: circleRadius,
                            color: '#9333ea',
                            fillColor: '#f3e8ff',
                            fillOpacity: 0.08,
                            weight: 2,
                            opacity: 0.5,
                            dashArray: '8, 12'
                        }).addTo(map);
                        
                        const bufferKm = foundHospitals.length === 1 ? '2.5' : '1.0';
                        rotationCircle.bindPopup(`
                            <div class="popup-content">
                                <div class="popup-title">Rotation Coverage Area</div>
                                <div class="popup-detail"><strong>Hospitals:</strong> ${foundHospitals.length}</div>
                                <div class="popup-detail"><strong>Radius:</strong> ${(circleRadius / 1000).toFixed(1)} km</div>
                                <div class="popup-detail"><strong>Buffer:</strong> ±${bufferKm} km</div>
                                <div style="margin-top: 8px; font-size: 0.85em; color: #64748b;">
                                    ${foundHospitals.length === 1 ? 'Area around hospital location' : 'Tight coverage around found hospital locations'}
                                </div>
                            </div>
                        `);
                        
                        const logBuffer = foundHospitals.length === 1 ? '2.5km' : '1km';
                        console.log(`⭕ Rotation circle added with radius: ${(circleRadius / 1000).toFixed(2)} km (${logBuffer} buffer)`);
                    } else if (maxDistance <= 1000) {
                        console.log('⚪ Circle not shown (hospitals within 1km of each other)');
                    } else {
                        console.log(`⚪ Circle not shown (hospitals too far apart: ${(maxDistance / 1000).toFixed(1)} km - may span multiple regions)`);
                    }
                } else if (foundHospitals.length === 1) {
                    // This case is now handled above
                    console.log('⚪ Note: Single hospital case handled with 2.5km circle');
                }
                
                // Draw lines connecting main hospital to all other hospitals (star pattern)
                if (foundHospitals.length >= 2) {
                    const mainHospital = foundHospitals[0]; // First hospital is main
                    const mainCoord = [mainHospital.lat, mainHospital.lon];
                    
                    hospitalConnections = L.layerGroup();
                    
                    // Connect main hospital to each other hospital
                    for (let i = 1; i < foundHospitals.length; i++) {
                        const otherHospital = foundHospitals[i];
                        const otherCoord = [otherHospital.lat, otherHospital.lon];
                        
                        // Calculate distance between hospitals using Haversine formula
                        const R = 6371000; // Earth's radius in meters
                        const dLat = (otherHospital.lat - mainHospital.lat) * Math.PI / 180;
                        const dLon = (otherHospital.lon - mainHospital.lon) * Math.PI / 180;
                        const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                                Math.cos(mainHospital.lat * Math.PI / 180) * Math.cos(otherHospital.lat * Math.PI / 180) *
                                Math.sin(dLon/2) * Math.sin(dLon/2);
                        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
                        const distance = R * c; // Distance in meters
                        const distanceKm = (distance / 1000).toFixed(1);
                        
                        const polyline = L.polyline([mainCoord, otherCoord], {
                            color: '#9333ea',
                            weight: 3,
                            opacity: 0.6,
                            dashArray: '10, 10'
                        }).bindTooltip(`${distanceKm} km`, {
                            permanent: true,
                            direction: 'center',
                            className: 'distance-label',
                            offset: [0, 0]
                        });
                        
                        hospitalConnections.addLayer(polyline);
                    }
                    
                    map.addLayer(hospitalConnections);
                    console.log(`🔗 Connected main hospital to ${foundHospitals.length - 1} other hospital(s) in star pattern with distances`);
                }
                
                // Zoom to show rotation location + hospitals + circle (if exists)
                const bounds = L.latLngBounds();
                
                // Add all hospital markers to bounds
                foundHospitals.forEach(h => {
                    bounds.extend([h.lat, h.lon]);
                });
                
                // Add rotation location
                bounds.extend([rotation.lat, rotation.lon]);
                
                // If there's a circle, extend bounds to include all corners of the circle
                if (rotationCircle) {
                    const circleBounds = rotationCircle.getBounds();
                    bounds.extend(circleBounds.getNorthEast());
                    bounds.extend(circleBounds.getSouthWest());
                    bounds.extend(circleBounds.getNorthWest());
                    bounds.extend(circleBounds.getSouthEast());
                    console.log('📐 Extended bounds to include full rotation circle (all corners)');
                }
                
                // Don't auto-zoom when showing hospitals - keep current map view
                // Fit map to show everything with good padding
                // Use setTimeout to ensure all layers are rendered before zooming
                // setTimeout(() => {
                //     map.fitBounds(bounds, { 
                //         padding: [100, 100],
                //         maxZoom: 11  // Don't zoom in too close
                //     });
                //     console.log('🔍 Map zoomed to show rotation + hospitals + complete circle');
                // }, 100); // Small delay to ensure rendering is complete
                console.log('🔍 Hospitals displayed at current zoom level (no auto-zoom)');
            } else {
                console.log('⚠️ No hospital markers to display - hospitals not in database');
            }
            
            console.log('🏥 ========== HOSPITAL DISPLAY COMPLETE ==========\n');
        }

        // Extract hospital names from rotation description
        function extractHospitalNames(description, area) {
            const hospitals = new Set();
            
            // Map NHS Trust names to their actual hospitals
            const trustToHospitalMap = {
                'Royal Free London NHS Foundation Trust': ['Royal Free Hospital'],
                'Imperial College Healthcare NHS Trust': ['Charing Cross Hospital', 'Hammersmith Hospital', 'St Mary\'s Hospital'],
                'London North West University Healthcare NHS Trust': ['Northwick Park Hospital', 'Ealing Hospital'],
                'University College London Hospitals NHS Foundation Trust': ['University College Hospital'],
                'Guy\'s and St Thomas\' NHS Foundation Trust': ['Guy\'s Hospital', 'St Thomas\' Hospital'],
                'King\'s College Hospital NHS Foundation Trust': ['King\'s College Hospital'],
                'Barts Health NHS Trust': ['The Royal London Hospital', 'St Bartholomew\'s Hospital', 'Whipps Cross Hospital'],
                'Lewisham and Greenwich NHS Trust': ['Lewisham Hospital', 'Queen Elizabeth Hospital'],
                'Epsom and St Helier University Hospitals NHS Trust': ['Epsom Hospital', 'St Helier Hospital'],
                'Barking, Havering and Redbridge University Hospitals NHS Trust': ['Queen\'s Hospital', 'King George Hospital'],
                'Buckinghamshire Healthcare NHS Trust': ['Stoke Mandeville Hospital']
            };
            
            // Check for NHS Trust names and add their hospitals
            for (const [trustName, hospitalList] of Object.entries(trustToHospitalMap)) {
                if (description.includes(trustName)) {
                    hospitalList.forEach(h => hospitals.add(h));
                }
            }
            
            // Specific hospital patterns - only match actual hospital names
            const hospitalPatterns = [
                /([A-Z][a-zA-Z\s&']+Hospital)/g,
                /([A-Z][a-zA-Z\s]+Infirmary)/g,
                /(Royal [A-Z][a-zA-Z\s]+Hospital)/g,
                /(St\.?\s+[A-Z][a-zA-Z\s']+Hospital)/gi,
                /(The [A-Z][a-zA-Z\s]+Hospital)/g
            ];
            
            // Extract from description
            hospitalPatterns.forEach(pattern => {
                const matches = description.matchAll(pattern);
                for (const match of matches) {
                    let name = match[1].trim();
                    
                    // Clean up the name
                    name = name.replace(/\s+/g, ' '); // Remove extra spaces
                    
                    // Skip if it contains NHS Trust organization text
                    if (/NHS Trust|Foundation Trust|Healthcare NHS|University Healthcare/i.test(name)) continue;
                    
                    // Skip if too short or contains other unwanted text
                    if (name.length < 5) continue;
                    if (/Acute|internal|Medicine|Training|Programme/i.test(name)) continue;
                    
                    hospitals.add(name);
                }
            });
            
            // Remove duplicates and subsets (e.g., if we have both "Park Hospital" and "Northwick Park Hospital", keep the longer one)
            const hospitalArray = Array.from(hospitals);
            const filtered = hospitalArray.filter((name, index) => {
                // Check if this name is a substring of any other name
                const isSubset = hospitalArray.some((other, otherIndex) => 
                    otherIndex !== index && other.includes(name) && other.length > name.length
                );
                return !isSubset;
            });
            
            return filtered;
        }

        // Add a hospital marker to the map
        function addHospitalMarker(hospital, rotation, isMain = false) {
            const size = isMain ? 28 : 18; // Main hospital is larger
            const emoji = isMain ? '🏥' : '🏥';
            const fontSize = isMain ? '16px' : '12px';
            const zIndex = isMain ? 2000 : 1000;
            
            const marker = L.marker([hospital.lat, hospital.lon], {
                icon: L.divIcon({
                    html: `<div class="hospital-marker-icon" style="background: ${isMain ? '#dc2626' : '#ef4444'}; 
                            color: white; border-radius: 50%; 
                            width: ${size}px; height: ${size}px; 
                            border: ${isMain ? '4px' : '3px'} solid white; 
                            box-shadow: 0 ${isMain ? '3' : '2'}px ${isMain ? '8' : '6'}px rgba(220, 38, 38, ${isMain ? '0.6' : '0.4'});
                            display: flex; align-items: center; justify-content: center;
                            font-size: ${fontSize};
                            transition: all 0.3s;">
                            ${emoji}</div>`,
                    iconSize: [size, size],
                    className: 'hospital-marker',
                    iconAnchor: [size/2, size/2]
                }),
                zIndexOffset: zIndex
            });

            marker.bindPopup(`
                <div class="popup-content">
                    <div class="popup-title">${isMain ? '🏥⭐ ' : '🏥 '}${hospital.hospital_name}${isMain ? ' (Main)' : ''}</div>
                    <div class="popup-detail"><strong>Location:</strong> ${hospital.name}</div>
                    <div class="popup-detail"><strong>Region:</strong> ${hospital.region}</div>
                    <div class="popup-detail"><strong>Rating:</strong> ⭐ ${hospital.google_rating.toFixed(1)}</div>
                    ${isMain ? '<div class="popup-detail" style="color: #dc2626; font-weight: 600;">Primary training site</div>' : ''}
                    <div style="margin-top: 10px; padding-top: 10px; border-top: 1px solid #e9d5ff;">
                        <div style="font-size: 0.85em; color: #6b21a8; font-weight: 600;">Part of rotation:</div>
                        <div style="font-size: 0.85em; color: #64748b;">${rotation.preference}</div>
                    </div>
                </div>
            `);

            hospitalMarkersLayer.addLayer(marker);
            
            // Store marker by hospital name for hover functionality
            hospitalMarkersByName[hospital.hospital_name] = marker;
        }
        
        // Highlight hospital marker on map
        function highlightHospitalMarker(hospitalName) {
            const marker = hospitalMarkersByName[hospitalName];
            if (marker) {
                // Find the marker icon and add highlight effect
                const markerElement = marker.getElement();
                if (markerElement) {
                    const icon = markerElement.querySelector('.hospital-marker-icon');
                    if (icon) {
                        icon.style.transform = 'scale(1.3)';
                        icon.style.boxShadow = '0 4px 16px rgba(220, 38, 38, 0.8)';
                        icon.style.border = '4px solid #fbbf24'; // Gold border
                    }
                }
                // Open popup
                marker.openPopup();
            }
        }
        
        // Remove highlight from hospital marker
        function unhighlightHospitalMarker(hospitalName) {
            const marker = hospitalMarkersByName[hospitalName];
            if (marker) {
                const markerElement = marker.getElement();
                if (markerElement) {
                    const icon = markerElement.querySelector('.hospital-marker-icon');
                    if (icon) {
                        icon.style.transform = 'scale(1)';
                        icon.style.boxShadow = ''; // Reset to CSS default
                        icon.style.border = ''; // Reset to CSS default
                    }
                }
                // Close popup
                marker.closePopup();
            }
        }

        // Get specialties for a rotation
        function getSpecialties(rotation) {
            const specs = [];
            if (rotation.has_haematology) specs.push('Haematology');
            if (rotation.has_cardiology) specs.push('Cardiology');
            if (rotation.has_respiratory) specs.push('Respiratory');
            if (rotation.has_gastroenterology) specs.push('Gastroenterology');
            if (rotation.has_endocrinology) specs.push('Endocrinology');
            if (rotation.has_neurology) specs.push('Neurology');
            if (rotation.has_renal) specs.push('Renal');
            if (rotation.has_geriatric) specs.push('Geriatric');
            if (rotation.has_icu) specs.push('ICU');
            return specs;
        }

        // Show commute information
        async function showCommuteInfo(rotation) {
            const commuteInfoDiv = document.getElementById('commuteInfo');
            const commuteDetailsDiv = document.getElementById('commuteDetails');

            // Extract hospital names
            const hospitalNames = extractHospitalNames(rotation.description, rotation.area);
            const specialties = getSpecialties(rotation);
            
            let hospitalInfo = '';
            if (rotation.hospitals && rotation.hospitals.length > 0) {
                hospitalInfo = `
                    <div class="commute-item">
                        <div class="commute-mode">Hospitals in Programme</div>
                        <div>${rotation.hospitals.join(', ')}</div>
                    </div>
                `;
            }
            
            let extractedHospitals = '';
            if (hospitalNames.length > 0) {
                const hospitalBadges = hospitalNames.map(name => 
                    `<span class="hospital-badge" 
                           title="${name}" 
                           onmouseover="highlightHospitalMarker('${name.replace(/'/g, "\\'")}')"
                           onmouseout="unhighlightHospitalMarker('${name.replace(/'/g, "\\'")}')">${name}</span>`
                ).join('');
                extractedHospitals = `
                    <div class="commute-item">
                        <div class="commute-mode">Hospital Locations Found</div>
                        <div style="display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px;">
                            ${hospitalBadges}
                        </div>
                    </div>
                `;
            }
            
            let specialtiesInfo = '';
            if (specialties.length > 0) {
                specialtiesInfo = `
                    <div class="commute-item">
                        <div class="commute-mode">Specializations</div>
                        <div style="display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px;">
                            ${specialties.map(s => `<span class="spec-badge">${s}</span>`).join('')}
                        </div>
                    </div>
                `;
            }
            
            let descriptionInfo = '';
            if (rotation.description && rotation.description.trim()) {
                descriptionInfo = `
                    <div class="commute-item">
                        <div class="commute-mode">Description</div>
                        <div style="font-size: 0.85em; line-height: 1.6; color: #475569; white-space: pre-wrap;">${rotation.description}</div>
                    </div>
                `;
            }

            commuteDetailsDiv.innerHTML = `
                <div class="commute-item" style="background: linear-gradient(135deg, #f3e8ff 0%, #e9d5ff 100%); border-left: 4px solid #9333ea;">
                    <div class="commute-mode" style="color: #6b21a8; font-weight: 700; font-size: 0.95em;">${rotation.preference || rotation.programme_name}</div>
                    <div style="font-size: 0.85em; color: #1f2937; margin-top: 6px;">
                        <span class="rating-badge" style="background: #fbbf24; color: #78350f; border: 1px solid #f59e0b;">★ ${rotation.google_rating.toFixed(1)}</span>
                        <span style="margin-left: 8px; color: #64748b;">6 months per rotation • ${rotation.places_available} ${rotation.places_available !== 1 ? 'places' : 'place'}</span>
                    </div>
                </div>
                <div class="commute-item">
                    <div class="commute-mode">Rotation Location</div>
                    <div>${rotation.location_name}, ${rotation.region}</div>
                </div>
                ${specialtiesInfo}
                ${hospitalInfo}
                ${extractedHospitals}
                ${descriptionInfo}
                <div class="commute-item" style="font-size: 0.8em; color: #94a3b8; background: #f8fafc; border: 1px dashed #cbd5e1;">
                    Red markers show hospital locations. Hover over hospital badges to highlight them on the map. Each rotation lasts 6 months.
                </div>
            `;

            commuteInfoDiv.classList.add('show');
        }

        // Display borough boundaries
        function displayBoroughs() {
            if (!londonBoroughs) return;

            boroughsLayer.clearLayers();

            londonBoroughs.features.forEach(feature => {
                const boroughName = feature.properties.name || 'London Borough';
                const polygon = L.geoJSON(feature, {
                    style: {
                        fillColor: '#faf5ff',
                        fillOpacity: 0.02,
                        color: '#f3e8ff',
                        weight: 1,
                        opacity: 0.15
                    }
                }).bindPopup(`
                    <div class="popup-content">
                        <div class="popup-title">📍 ${boroughName}</div>
                        <div style="font-size: 0.85em; color: #64748b; margin-top: 5px;">
                            London Borough
                        </div>
                    </div>
                `);

                boroughsLayer.addLayer(polygon);
            });
        }

        // Toggle London boroughs
        function toggleBoroughs() {
            const showBoroughs = document.getElementById('showBoroughs').checked;
            
            if (showBoroughs) {
                if (londonBoroughs) {
                    displayBoroughs();
                }
            } else {
                boroughsLayer.clearLayers();
            }
        }

        // Toggle hospitals
        function toggleHospitals() {
            const showHospitals = document.getElementById('showHospitals').checked;
            
            if (showHospitals) {
                map.addLayer(markersLayer);
            } else {
                map.removeLayer(markersLayer);
            }
        }

        // Clear selection and hospital markers
        function clearSelection() {
            selectedRotation = null;
            hospitalMarkersLayer.clearLayers();
            hospitalMarkersByName = {}; // Clear hospital marker references
            map.removeLayer(hospitalMarkersLayer);
            
            if (hospitalConnections) {
                map.removeLayer(hospitalConnections);
                hospitalConnections = null;
            }
            
            if (rotationCircle) {
                map.removeLayer(rotationCircle);
                rotationCircle = null;
            }
            document.getElementById('commuteInfo').classList.remove('show');
            
            // Restore general hospital markers if the checkbox is enabled
            const showHospitals = document.getElementById('showHospitals').checked;
            if (showHospitals && !map.hasLayer(markersLayer)) {
                map.addLayer(markersLayer);
                console.log('🔄 Restored general hospital markers');
            }
            
            updateSidebar();
            
            // Zoom back to all filtered rotations
            if (filteredRotations.length > 0 && markersLayer.getBounds().isValid()) {
                map.fitBounds(markersLayer.getBounds(), { padding: [50, 50] });
            }
        }

        // Update statistics
        function updateStats() {
            document.getElementById('totalRotations').textContent = allRotations.length;
            document.getElementById('displayedRotations').textContent = filteredRotations.length;
            
            const avgRating = filteredRotations.length > 0
                ? (filteredRotations.reduce((sum, r) => sum + r.google_rating, 0) / filteredRotations.length).toFixed(1)
                : '0.0';
            document.getElementById('avgRating').textContent = avgRating;
            
            const uniqueLocations = new Set(filteredRotations.map(r => r.location_name));
            document.getElementById('locationsCount').textContent = uniqueLocations.size;
        }

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', initMap);
    </script>
